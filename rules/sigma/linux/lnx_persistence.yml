title: Cron Job Created for Persistence
id: f8a9b0c1-d2e3-4f4a-5b6c-7d8e9f0a1b2c
status: stable
description: Detects cron job modifications that may indicate persistence mechanism installation.
tags:
    - attack.persistence
    - attack.t1053.003
logsource:
    product: linux
    service: cron
detection:
    selection:
        message|contains:
            - "CRON"
            - "crond"
    condition: selection
falsepositives:
    - Legitimate cron jobs
level: info
---
title: New User Account Added to Linux System
id: a9b0c1d2-e3f4-4a5b-6c7d-8e9f0a1b2c3d
status: stable
description: Detects addition of new local user accounts which may indicate attacker persistence.
tags:
    - attack.persistence
    - attack.t1136.001
logsource:
    product: linux
    service: auth
detection:
    selection:
        message|contains:
            - "new user:"
            - "useradd"
        event_category: "user_add"
    condition: selection
falsepositives:
    - Legitimate user provisioning
level: medium
---
title: SSH Authorized Keys Modification
id: b0c1d2e3-f4a5-4b6c-7d8e-9f0a1b2c3d4e
status: stable
description: Detects modification of SSH authorized_keys files for persistence.
tags:
    - attack.persistence
    - attack.t1098.004
logsource:
    product: linux
    service: audit
detection:
    selection:
        message|contains: "authorized_keys"
        audit_type: "SYSCALL"
    condition: selection
falsepositives:
    - Legitimate SSH key management
level: high
---
title: Systemd Service Created for Persistence
id: c1d2e3f4-a5b6-4c7d-8e9f-0a1b2c3d4e5f
status: stable
description: Detects creation of new systemd service units for persistence.
tags:
    - attack.persistence
    - attack.t1543.002
logsource:
    product: linux
    service: syslog
detection:
    selection:
        message|contains:
            - "systemctl enable"
            - "systemctl daemon-reload"
            - ".service created"
    condition: selection
falsepositives:
    - Legitimate software installation
level: medium
