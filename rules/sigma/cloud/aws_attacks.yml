title: AWS Root Account Login
id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
status: stable
description: Detects AWS root account console login, which should never occur in a properly configured environment.
references:
    - https://attack.mitre.org/techniques/T1078/004/
tags:
    - attack.initial_access
    - attack.privilege_escalation
    - attack.t1078.004
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        event_name: "ConsoleLogin"
        identity_type: "Root"
    condition: selection
falsepositives:
    - Emergency root account usage
level: critical
---
title: AWS IAM Policy Modified to Grant Full Access
id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f8a
status: stable
description: Detects modification of IAM policies to grant overly permissive access.
tags:
    - attack.privilege_escalation
    - attack.t1098
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        event_name|contains:
            - "PutUserPolicy"
            - "PutRolePolicy"
            - "AttachUserPolicy"
            - "AttachRolePolicy"
    selection2:
        event_source: "iam.amazonaws.com"
    condition: selection and selection2
falsepositives:
    - Legitimate IAM policy management
level: high
---
title: AWS CloudTrail Logging Disabled
id: e5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8a9b
status: stable
description: Detects disabling of AWS CloudTrail logging (defense evasion).
tags:
    - attack.defense_evasion
    - attack.t1562.008
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        event_name:
            - "StopLogging"
            - "DeleteTrail"
            - "UpdateTrail"
    condition: selection
falsepositives:
    - Legitimate trail management
level: high
---
title: AWS S3 Bucket Public Access Modified
id: f6a7b8c9-d0e1-4f2a-3b4c-5d6e7f8a9b0c
status: stable
description: Detects modifications to S3 bucket public access settings that may enable data exfiltration.
tags:
    - attack.exfiltration
    - attack.t1537
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        event_name|contains:
            - "PutBucketAcl"
            - "PutBucketPolicy"
            - "DeleteBucketPolicy"
    condition: selection
falsepositives:
    - Legitimate bucket policy management
level: medium
---
title: AWS Security Group Modified — All Traffic Allowed
id: a7b8c9d0-e1f2-4a3b-4c5d-6e7f8a9b0c1d
status: stable
description: Detects security group rule modifications that may allow unrestricted inbound access.
tags:
    - attack.defense_evasion
    - attack.initial_access
    - attack.t1562
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        event_name:
            - "AuthorizeSecurityGroupIngress"
            - "AuthorizeSecurityGroupEgress"
    condition: selection
falsepositives:
    - Legitimate network configuration
level: medium
