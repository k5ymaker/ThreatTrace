title: AWS EC2 Instance Created in Unusual Region
id: b8c9d0e1-f2a3-4b4c-5d6e-7f8a9b0c1d2e
status: experimental
description: Detects EC2 instance creation, which may indicate unauthorized resource usage.
tags:
    - attack.resource_development
    - attack.t1496
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        event_name: "RunInstances"
        event_source: "ec2.amazonaws.com"
    condition: selection
falsepositives:
    - Legitimate EC2 usage
level: low
