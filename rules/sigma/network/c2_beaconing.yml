title: Suricata DNS Exfiltration Alert
id: e9f0a1b2-c3d4-4e5f-6a7b-8c9d0e1f2a3b
status: stable
description: Detects Suricata alerts for DNS-based data exfiltration.
tags:
    - attack.exfiltration
    - attack.t1048.003
logsource:
    product: suricata
detection:
    selection:
        event_type: "alert"
        alert_category|contains:
            - "DNS"
            - "Exfil"
            - "Tunneling"
    condition: selection
falsepositives:
    - False positive DNS alerts
level: high
