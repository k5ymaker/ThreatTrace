title: Zeek DNS — Long Domain Name (DGA Indicator)
id: f0a1b2c3-d4e5-4f6a-7b8c-9d0e1f2a3b4c
status: experimental
description: Detects excessively long DNS query names that may indicate DGA or DNS tunneling.
tags:
    - attack.command_and_control
    - attack.t1568.002
logsource:
    product: zeek
    service: dns
detection:
    selection:
        query|contains: "."
    condition: selection
falsepositives:
    - CDN and cloud service domains
level: info
---
title: Cisco ASA Connection Denied to External IP
id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
status: stable
description: Detects outbound connections denied by Cisco ASA firewall.
tags:
    - attack.command_and_control
    - attack.t1071
logsource:
    product: cisco
    service: asa
detection:
    selection:
        action: "Deny"
        direction: "outbound"
    condition: selection
falsepositives:
    - Legitimate blocked traffic
level: info
---
title: Palo Alto Threat Log — Spyware or C2 Category
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
status: stable
description: Detects Palo Alto threat log entries for spyware or C2 traffic categories.
tags:
    - attack.command_and_control
    - attack.t1071
logsource:
    product: palo-alto
    service: firewall
detection:
    selection:
        log_type: "THREAT"
        category|contains:
            - "spyware"
            - "command-and-control"
            - "botnet"
    condition: selection
falsepositives:
    - False positive threat signatures
level: high
