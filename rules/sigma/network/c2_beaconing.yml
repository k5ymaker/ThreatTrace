title: Suricata Alert — Known C2 Framework Signature
id: d8e9f0a1-b2c3-4d4e-5f6a-7b8c9d0e1f2a
status: stable
description: Detects Suricata IDS alerts for known C2 framework signatures.
tags:
    - attack.command_and_control
    - attack.t1071
logsource:
    product: suricata
detection:
    selection:
        event_type: "alert"
        alert_category|contains:
            - "Trojan"
            - "Malware"
            - "CobaltStrike"
            - "C2"
            - "Beacon"
    condition: selection
falsepositives:
    - False positive IDS rules
level: high
