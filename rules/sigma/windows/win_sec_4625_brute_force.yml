title: Windows Logon Failure Brute Force (Event ID 4625)
id: a8c5a3d1-2b4e-4f6c-8d9a-0e1b2c3d4e5f
status: stable
description: Detects multiple failed logon attempts indicating a brute force or credential stuffing attack.
references:
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
    - https://attack.mitre.org/techniques/T1110/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.credential_access
    - attack.t1110
    - attack.t1110.001
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: "4625"
    condition: selection
falsepositives:
    - Legitimate users who mistype their password
level: medium
