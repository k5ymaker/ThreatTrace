title: Suspicious SMB Lateral Movement via Net Use
id: b8c9d0e1-f2a3-4b4c-5d6e-7f8a9b0c1d2e
status: stable
description: Detects net.exe use commands that may indicate lateral movement via SMB shares.
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - "net.exe"
            - "net1.exe"
        CommandLine|contains:
            - "use \\"
            - "use /user:"
    condition: selection
falsepositives:
    - Legitimate network drive mapping
level: medium
---
title: PsExec Service Installation (Event ID 7045)
id: c9d0e1f2-a3b4-4c5d-6e7f-8a9b0c1d2e3f
status: stable
description: Detects PsExec service installation on a target system.
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    product: windows
    service: system
detection:
    selection:
        EventID: "7045"
        ServiceName|contains: "PSEXE"
    condition: selection
falsepositives:
    - Authorized use of PsExec by administrators
level: high
---
title: Pass-the-Hash (Event ID 4624 — NtLmSsp NTLM)
id: d0e1f2a3-b4c5-4d6e-7f8a-9b0c1d2e3f4a
status: stable
description: Detects potential Pass-the-Hash (PtH) attack via NTLM logon with empty password.
references:
    - https://attack.mitre.org/techniques/T1550/002/
tags:
    - attack.lateral_movement
    - attack.credential_access
    - attack.t1550.002
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: "4624"
        LogonType: "3"
        AuthenticationPackageName: "NTLM"
        KeyLength: "0"
    condition: selection
falsepositives:
    - Some legitimate network logons
level: high
---
title: Kerberoasting — Service Ticket Request (Event ID 4769)
id: e1f2a3b4-c5d6-4e7f-8a9b-0c1d2e3f4a5b
status: stable
description: Detects Kerberoasting attacks via excessive TGS requests for non-machine accounts.
references:
    - https://attack.mitre.org/techniques/T1558/003/
tags:
    - attack.credential_access
    - attack.t1558.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: "4769"
        TicketEncryptionType: "0x17"
        ServiceName|contains: "$"
    filter:
        ServiceName|endswith: "$"
    condition: selection and not filter
falsepositives:
    - None expected for RC4 encryption type
level: high
---
title: RDP Lateral Movement (Event ID 4624 LogonType 10)
id: f2a3b4c5-d6e7-4f8a-9b0c-1d2e3f4a5b6c
status: stable
description: Detects RDP (Remote Interactive) logon events indicating potential lateral movement.
tags:
