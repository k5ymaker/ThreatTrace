title: Windows DCSync Attack (Event ID 4662)
id: c1e7f5a3-4d6b-4c8e-0f1a-2b3c4d5e6f7a
status: stable
description: Detects DCSync attacks where an attacker replicates AD password data using DS-Replication-Get-Changes rights.
references:
    - https://attack.mitre.org/techniques/T1003/006/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.credential_access
    - attack.t1003.006
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: "4662"
        Properties|contains:
            - "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
            - "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"
            - "89e95b76-444d-4c62-991a-0facbeda640c"
    filter:
        SubjectUserName|endswith: "$"
    condition: selection and not filter
falsepositives:
    - Azure AD Connect
    - Legitimate AD replication
level: high
---
title: LSASS Memory Access (Event ID 10 Sysmon)
id: d2f8a6b4-5e7c-4d9f-1a2b-3c4d5e6f7a8b
status: stable
description: Detects access to LSASS memory via Sysmon Process Access events.
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: "10"
        TargetImage|endswith: "lsass.exe"
        GrantedAccess|contains:
            - "0x1010"
            - "0x1410"
            - "0x1438"
            - "0x143a"
            - "0x1f0fff"
            - "0x1fffff"
    condition: selection
falsepositives:
    - AV products
    - EDR solutions
level: critical
