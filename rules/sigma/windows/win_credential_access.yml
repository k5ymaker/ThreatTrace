title: User Added to Privileged Group (Event ID 4728/4732/4756)
id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
status: stable
description: Detects addition of a user to a high-privilege local or domain group.
tags:
    - attack.privilege_escalation
    - attack.t1098
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID:
            - "4728"
            - "4732"
            - "4756"
        MemberName|contains: "-500"
    selection2:
        EventID:
            - "4728"
            - "4732"
            - "4756"
        TargetUserName|contains:
            - "Administrators"
            - "Domain Admins"
            - "Enterprise Admins"
            - "Schema Admins"
    condition: selection or selection2
falsepositives:
    - Legitimate admin tasks
level: high
