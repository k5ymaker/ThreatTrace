title: AWS Root Account Console Login
id: c3d4e5f6-a7b8-9012-cdef-123456789013
status: stable
description: Detects console login by the AWS root account, which should never be used for routine operations according to AWS security best practices. Root account usage may indicate account compromise or unauthorized privileged access.
references:
    - https://attack.mitre.org/techniques/T1078/004/
    - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html
    - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-aws-console-sign-in-events.html
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1078.004
    - attack.initial_access
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventName: 'ConsoleLogin'
        userIdentity.type: 'Root'
    condition: selection
falsepositives:
    - Emergency root access for account recovery
    - Initial account setup before IAM users are created
level: critical
