title: Azure AD Risky Sign-In
id: e5f6a7b8-c9d0-1234-efab-345678901235
status: stable
description: Detects risky sign-in events in Azure Active Directory where the sign-in failed or was flagged with medium or high risk level, indicating potential account compromise, credential stuffing, or anomalous authentication behavior
references:
    - https://attack.mitre.org/techniques/T1078/004/
    - https://docs.microsoft.com/en-us/azure/active-directory/identity-protection/concept-identity-protection-risks
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1078.004
    - attack.initial_access
logsource:
    product: azure
    service: signinlogs
detection:
    selection_failed:
        resultType|not: '0'
    selection_risky:
        riskLevelDuringSignIn|contains:
            - 'medium'
            - 'high'
    condition: selection_failed or selection_risky
falsepositives:
    - Legitimate users signing in from unusual locations while traveling
    - VPN usage triggering location-based risk signals
    - New device sign-ins during device enrollment
level: high
