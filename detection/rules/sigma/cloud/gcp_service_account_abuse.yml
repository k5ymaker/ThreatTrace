title: GCP Service Account Privilege Escalation
id: f6a7b8c9-d0e1-2345-fabc-456789012346
status: stable
description: Detects potential GCP service account privilege escalation by identifying IAM policy modifications that grant highly privileged roles such as owner or editor, which could indicate an attacker attempting to elevate their access level
references:
    - https://attack.mitre.org/techniques/T1098/003/
    - https://cloud.google.com/iam/docs/audit-logging
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1098.003
    - attack.privilege_escalation
logsource:
    product: gcp
    service: audit
detection:
    selection:
        methodName|contains: 'setIamPolicy'
        roles|contains:
            - 'roles/owner'
            - 'roles/editor'
    condition: selection
falsepositives:
    - Authorized infrastructure provisioning and setup
    - Terraform or other IaC tools applying policy changes
    - GCP organization administrators making intentional permission grants
level: high
