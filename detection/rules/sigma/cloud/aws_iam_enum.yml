title: AWS IAM Enumeration
id: b2c3d4e5-f6a7-8901-bcde-012345678901
status: stable
description: Detects AWS IAM enumeration activity by identifying CloudTrail events for listing users, roles, policies, and groups, which may indicate an attacker mapping permissions after initial access
references:
    - https://attack.mitre.org/techniques/T1087/004/
    - https://docs.aws.amazon.com/IAM/latest/UserGuide/cloudtrail-integration.html
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1087.004
    - attack.discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventName|contains:
            - 'ListUsers'
            - 'ListRoles'
            - 'ListPolicies'
            - 'ListGroups'
            - 'GetAccountAuthorizationDetails'
    condition: selection
falsepositives:
    - Legitimate IAM audits and compliance checks
    - Cloud security posture management (CSPM) tools
    - AWS Config and Security Hub service calls
    - Authorized administrative operations
level: medium
