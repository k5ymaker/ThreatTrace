title: UAC Bypass via HKCU Registry Class Hijack
id: a3b2c1d0-1234-5678-abcd-ef0123456789
status: stable
description: >
  Detects common UAC bypass techniques that hijack HKCU registry keys under
  Software\Classes to redirect auto-elevated binary execution. Covers
  EventViewer, SDCLT, wsreset, perfmon, compmgmtlauncher, and similar methods.
references:
  - https://github.com/sbousseaden/EVTX-ATTACK-SAMPLES
author: ThreatTrace
date: 2026/01/01
tags:
  - attack.privilege_escalation
  - attack.t1548.002
  - attack.defense_evasion
logsource:
  product: windows
  service: sysmon
detection:
  reg_hijack:
    EventID: 13
    TargetObject|contains:
      - 'HKCU\Software\Classes\mscfile\shell\open\command'
      - 'HKCU\Software\Classes\ms-settings\shell\open\command'
      - 'HKCU\Software\Classes\exefile\shell\open\command'
      - 'HKCU\Software\Classes\AppX'
      - 'HKCU\Software\Classes\CLSID'
  elevated_spawn:
    EventID: 1
    IntegrityLevel: High
    ParentImage|endswith:
      - '\eventvwr.exe'
      - '\sdclt.exe'
      - '\wsreset.exe'
      - '\perfmon.exe'
      - '\CompMgmtLauncher.exe'
      - '\fodhelper.exe'
      - '\changepk.exe'
  condition: reg_hijack or elevated_spawn
falsepositives:
  - Legitimate administrative tasks on properly managed systems
level: high
