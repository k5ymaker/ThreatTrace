title: SeDebugPrivilege Enabled on Non-SYSTEM Account
id: c5d4e3f2-3456-7890-cdef-012345678901
status: stable
description: Detects EventID 4703 where SeDebugPrivilege is enabled, indicating
  potential process injection or credential dumping setup.
references:
  - https://github.com/sbousseaden/EVTX-ATTACK-SAMPLES
author: ThreatTrace
date: 2026/01/01
tags:
  - attack.privilege_escalation
  - attack.t1134.001
  - attack.credential_access
  - attack.t1003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4703
    EnabledPrivilegeList|contains: 'SeDebugPrivilege'
  filter_system:
    SubjectUserName: 'SYSTEM'
  condition: selection and not filter_system
falsepositives:
  - Debuggers and development tools running under admin accounts
level: high
