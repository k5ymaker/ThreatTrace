title: SID History Injection for Privilege Escalation
id: f8g7h6i5-6789-0123-fabc-345678901234
status: stable
description: Detects addition of privileged SIDs to a user's SIDHistory attribute,
  commonly used after domain compromise to maintain persistent admin access.
references:
  - https://github.com/sbousseaden/EVTX-ATTACK-SAMPLES
author: ThreatTrace
date: 2026/01/01
tags:
  - attack.privilege_escalation
  - attack.persistence
  - attack.t1134.005
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4765
  filter_legitimate:
    SubjectUserName|endswith: '$'
    SubjectDomainName: 'NT AUTHORITY'
  condition: selection and not filter_legitimate
falsepositives:
  - Domain migrations performed by authorized migration tools (e.g., ADMT)
level: critical
