title: Windows Logon Brute Force
id: a9b0c1d2-e3f4-5678-abcd-789012345678
status: stable
description: Detects Windows logon brute force attacks by identifying more than 10 failed logon attempts (EventID 4625) from the same IP address within a short time window
references:
    - https://attack.mitre.org/techniques/T1110/
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1110
    - attack.credential_access
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
    condition: selection | count() by IpAddress > 10
falsepositives:
    - Misconfigured applications with incorrect credentials
    - Users forgetting passwords and attempting multiple times
    - Automated systems with stale cached credentials
level: high
