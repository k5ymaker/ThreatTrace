title: LSASS Memory Dump Attempt
id: e1f2a3b4-c5d6-7890-efab-901234567890
status: stable
description: Detects attempts to dump LSASS process memory for credential extraction by monitoring for process access to lsass.exe with elevated access rights commonly used by credential dumping tools
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/command-line-process-auditing
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1003.001
    - attack.credential_access
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 10
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1038'
            - '0x1fffff'
            - '0x1F3FFF'
    condition: selection
falsepositives:
    - Antivirus and endpoint security products accessing LSASS for monitoring
    - Windows Defender Credential Guard
    - Legitimate administrative tools
level: critical
