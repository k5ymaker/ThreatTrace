title: Windows Security Event Log Cleared
id: b4c5d6e7-f8a9-0123-bcde-234567890123
status: stable
description: Detects clearing of the Windows Security or System event log, which is commonly performed by attackers to remove evidence of malicious activity and hinder forensic investigation
references:
    - https://attack.mitre.org/techniques/T1070/001/
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-1102
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1070.001
    - attack.defense_evasion
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID:
            - 1102
            - 104
    condition: selection
falsepositives:
    - Authorized system administrators performing log maintenance
    - Log rotation scripts in managed environments
    - SIEM agents clearing logs after ingestion (uncommon)
level: critical
