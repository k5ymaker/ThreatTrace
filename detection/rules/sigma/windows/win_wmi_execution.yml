title: Remote WMI Execution
id: f8a9b0c1-d2e3-4567-fabc-678901234567
status: stable
description: Detects remote WMI command execution via wmic.exe using the /node: parameter to target remote systems, which is commonly used for lateral movement and remote execution
references:
    - https://attack.mitre.org/techniques/T1047/
    - https://docs.microsoft.com/en-us/windows/win32/wmisdk/wmi-start-page
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1047
    - attack.execution
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4688
        NewProcessName|endswith: '\wmic.exe'
        CommandLine|contains: '/node:'
    condition: selection
falsepositives:
    - Legitimate remote system administration using WMIC
    - IT asset inventory and management tools
    - Configuration management systems
level: medium
