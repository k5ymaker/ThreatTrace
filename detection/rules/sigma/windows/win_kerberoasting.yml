title: Kerberoasting Attack
id: c9d0e1f2-a3b4-5678-cdef-789012345678
status: stable
description: Detects Kerberoasting attacks by identifying Kerberos service ticket requests using RC4 encryption (0x17) for non-machine service accounts, which is a common indicator of offline password cracking attempts
references:
    - https://attack.mitre.org/techniques/T1558/003/
    - https://adsecurity.org/?p=3458
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1558.003
    - attack.credential_access
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4769
        TicketEncryptionType: '0x17'
    filter_machine_accounts:
        ServiceName|endswith: '$'
    condition: selection and not filter_machine_accounts
falsepositives:
    - Older applications that only support RC4 encryption
    - Legacy systems requiring RC4 for compatibility
    - Authorized red team exercises
level: high
