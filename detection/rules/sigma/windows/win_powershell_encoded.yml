title: PowerShell Encoded Command Execution
id: e7f8a9b0-c1d2-3456-efab-567890123456
status: stable
description: Detects execution of PowerShell with encoded commands or dynamic code execution techniques commonly used to evade command-line logging and execute obfuscated malicious payloads
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1027/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1059.001
    - attack.defense_evasion
logsource:
    product: windows
    service: security
detection:
    selection_process:
        EventID: 4688
        CommandLine|contains:
            - '-EncodedCommand'
            - '-enc '
            - ' -e '
            - 'IEX('
            - 'Invoke-Expression'
            - 'FromBase64String'
    selection_ps_script:
        EventID: 4104
        ScriptBlockText|contains:
            - '-EncodedCommand'
            - 'IEX('
            - 'Invoke-Expression'
            - 'FromBase64String'
    condition: selection_process or selection_ps_script
falsepositives:
    - Legitimate administrative scripts using encoded commands for special characters
    - Software deployment tools using PowerShell with encoded parameters
    - Some enterprise management suites
level: high
