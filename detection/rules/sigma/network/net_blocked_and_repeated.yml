title: Repeated Firewall Blocks from Same Source
id: f0a1b2c3-d4e5-6789-fabc-890123456789
status: stable
description: Detects repeated connection attempts from the same source IP that are blocked by the firewall, indicating potential reconnaissance, brute force, or exploitation attempts against perimeter defenses
references:
    - https://attack.mitre.org/techniques/T1190/
    - https://attack.mitre.org/techniques/T1595/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1190
    - attack.initial_access
logsource:
    category: firewall
detection:
    selection:
        action:
            - 'deny'
            - 'drop'
    timeframe: 1h
    condition: selection | count() by source_ip > 10
falsepositives:
    - Misconfigured network devices sending traffic to wrong destinations
    - ISP network issues causing repeated retries
    - Authorized network scanners with incorrect firewall rules
level: medium
