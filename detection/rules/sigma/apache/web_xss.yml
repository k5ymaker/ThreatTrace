title: Cross-Site Scripting (XSS) Attempt
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: Detects XSS patterns in HTTP request parameters including script tags, event handlers, and JavaScript execution attempts
references:
    - https://attack.mitre.org/techniques/T1059.007/
    - https://owasp.org/www-community/attacks/xss/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1059.007
    - attack.execution
logsource:
    category: webserver
    product: apache
detection:
    selection:
        url|contains:
            - '<script'
            - '%3Cscript'
            - 'javascript:'
            - 'onerror='
            - 'onload='
            - 'onmouseover='
            - 'alert('
            - 'document.cookie'
            - '<svg onload'
            - 'eval('
    condition: selection
falsepositives:
    - Security testing tools
    - Web application security scanners
level: medium
