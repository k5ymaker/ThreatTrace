title: Local File Inclusion (LFI) Attempt
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: stable
description: Detects Local File Inclusion attempts in HTTP request URLs using path traversal sequences or direct references to sensitive system files
references:
    - https://attack.mitre.org/techniques/T1083/
    - https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1083
    - attack.discovery
logsource:
    category: webserver
    product: apache
detection:
    selection:
        url|contains:
            - '../../../'
            - '..%2F..%2F'
            - '/etc/passwd'
            - '/etc/shadow'
            - '/proc/self/environ'
            - 'php://filter'
            - 'php://input'
            - '..%252F'
            - '/windows/system32'
    condition: selection
falsepositives:
    - Legitimate application path traversal in controlled environments
    - Security testing and penetration testing
level: high
