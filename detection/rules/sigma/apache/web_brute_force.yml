title: HTTP Authentication Brute Force
id: a7b8c9d0-e1f2-3456-abcd-567890123456
status: stable
description: Detects HTTP authentication brute force attacks by identifying more than 20 failed authentication responses (401 or 403) from the same source IP address
references:
    - https://attack.mitre.org/techniques/T1110/
    - https://owasp.org/www-community/attacks/Brute_force_attack
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1110
    - attack.credential_access
logsource:
    category: webserver
    product: apache
detection:
    selection:
        status_code:
            - 401
            - 403
    condition: selection | count() by source_ip > 20
falsepositives:
    - Misconfigured applications causing repeated 401/403 responses
    - Legitimate users forgetting credentials
    - Load balancer health checks with incorrect credentials
level: high
