title: Web Vulnerability Scanner User Agent
id: f6a7b8c9-d0e1-2345-fabc-456789012345
status: stable
description: Detects HTTP requests from well-known web vulnerability scanners and exploitation tools based on their User-Agent strings
references:
    - https://attack.mitre.org/techniques/T1595/
    - https://attack.mitre.org/techniques/T1595/002/
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1595
    - attack.reconnaissance
logsource:
    category: webserver
    product: apache
detection:
    selection:
        user_agent|contains:
            - 'sqlmap'
            - 'nikto'
            - 'nmap'
            - 'masscan'
            - 'ZAP'
            - 'BurpSuite'
            - 'Acunetix'
            - 'Nessus'
            - 'OpenVAS'
            - 'dirbuster'
            - 'gobuster'
            - 'wfuzz'
            - 'hydra'
            - 'medusa'
            - 'nuclei'
            - 'ffuf'
            - 'feroxbuster'
    condition: selection
falsepositives:
    - Authorized penetration testing engagements
    - Internal security assessments
    - Bug bounty hunters with permission
level: medium
