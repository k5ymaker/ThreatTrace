title: SQL Injection Attempt in Web Request
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: Detects SQL injection patterns in HTTP request URLs and parameters
references:
    - https://attack.mitre.org/techniques/T1190/
    - https://owasp.org/www-community/attacks/SQL_Injection
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.initial_access
    - attack.t1190
logsource:
    category: webserver
    product: apache
detection:
    selection:
        url|contains:
            - 'UNION SELECT'
            - 'UNION%20SELECT'
            - 'UNION+SELECT'
            - 'information_schema'
            - 'sleep('
            - 'SLEEP('
            - 'benchmark('
            - 'BENCHMARK('
            - 'xp_cmdshell'
            - "' OR '1'='1"
            - "' OR 1=1"
            - '1 OR 1=1'
            - 'extractvalue('
            - 'updatexml('
            - 'load_file('
            - 'into outfile'
    condition: selection
falsepositives:
    - Legitimate security testing
    - WAF testing
level: high
