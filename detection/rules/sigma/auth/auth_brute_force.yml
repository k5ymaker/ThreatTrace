title: Authentication Brute Force (Generic)
id: a7b8c9d0-e1f2-3456-abcd-567890123457
status: stable
description: Detects generic authentication brute force attacks by identifying more than 15 authentication failure events from the same source IP within a 10 minute window across any authentication source
references:
    - https://attack.mitre.org/techniques/T1110/
    - https://owasp.org/www-community/attacks/Brute_force_attack
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1110
    - attack.credential_access
logsource:
    category: authentication
detection:
    selection:
        event_type:
            - 'authentication_failure'
            - 'login_failed'
            - 'auth_failure'
        result: 'failure'
    timeframe: 10m
    condition: selection | count() by source_ip > 15
falsepositives:
    - Applications with expired or misconfigured service account credentials
    - Users repeatedly mistyping their passwords
    - Automated testing frameworks running authentication tests
level: high
