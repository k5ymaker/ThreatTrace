title: Credential Stuffing Attack
id: b8c9d0e1-f2a3-4567-bcde-678901234568
status: stable
description: Detects credential stuffing attacks by identifying a single source IP attempting authentication against more than 5 distinct usernames within a 10 minute window, indicating the use of previously breached credential lists
references:
    - https://attack.mitre.org/techniques/T1110/004/
    - https://owasp.org/www-community/attacks/Credential_stuffing
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1110.004
    - attack.credential_access
logsource:
    category: authentication
detection:
    selection:
        event_type:
            - 'authentication_failure'
            - 'login_failed'
            - 'auth_failure'
        result: 'failure'
    timeframe: 10m
    condition: selection | count(username) by source_ip > 5
falsepositives:
    - Shared NAT IP addresses where multiple users are failing authentication
    - Load balancers or proxy servers appearing as a single source IP
    - Automated test suites testing multiple user accounts
level: high
