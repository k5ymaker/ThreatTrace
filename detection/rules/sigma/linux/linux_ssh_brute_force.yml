title: SSH Brute Force Attack
id: c1d2e3f4-a5b6-7890-cdef-901234567890
status: stable
description: Detects SSH brute force attacks by identifying more than 10 failed password authentication attempts or invalid user login attempts from the same source IP
references:
    - https://attack.mitre.org/techniques/T1110/001/
    - https://www.ssh.com/academy/ssh/brute-force
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1110.001
    - attack.credential_access
logsource:
    product: linux
    service: auth
detection:
    selection:
        message|contains:
            - 'Failed password'
            - 'Invalid user'
    condition: selection | count() by source_ip > 10
falsepositives:
    - Misconfigured SSH clients with wrong keys or credentials
    - Automated backup jobs with stale SSH credentials
    - Legitimate users forgetting their passwords
level: high
