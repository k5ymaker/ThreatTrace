title: /etc/shadow File Read by Non-Root Process
id: f4a5b6c7-d8e9-0123-fabc-234567890123
status: stable
description: Detects attempts to read the /etc/shadow file by non-root processes via auditd syscall monitoring, which may indicate credential theft or privilege escalation attempts
references:
    - https://attack.mitre.org/techniques/T1003/008/
    - https://linux.die.net/man/5/shadow
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1003.008
    - attack.credential_access
logsource:
    product: linux
    service: auditd
detection:
    selection:
        type: SYSCALL
        syscall:
            - 'open'
            - 'openat'
    selection_path:
        type: PATH
        name: '/etc/shadow'
    filter_root:
        uid: '0'
    filter_legitimate:
        exe|contains:
            - '/bin/shadow'
            - '/usr/bin/shadow'
            - '/sbin/shadow'
            - '/usr/sbin/shadow'
    condition: selection and selection_path and not filter_root and not filter_legitimate
falsepositives:
    - Backup utilities running as non-root with elevated capabilities
    - Security scanning tools with explicit read permissions
level: critical
