title: New Cron Job Created
id: d2e3f4a5-b6c7-8901-defa-012345678901
status: stable
description: Detects creation of new cron jobs via crontab command or direct modification of system cron directories, which may indicate an attacker establishing persistence on a Linux system
references:
    - https://attack.mitre.org/techniques/T1053/003/
    - https://linux.die.net/man/5/crontab
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1053.003
    - attack.persistence
logsource:
    product: linux
    service: auditd
detection:
    selection_crontab:
        type: SYSCALL
        exe|contains: 'crontab'
    selection_cron_path:
        type: PATH
        name|startswith: '/etc/cron'
    condition: selection_crontab or selection_cron_path
falsepositives:
    - System administrators creating legitimate scheduled maintenance tasks
    - Software installation creating cron jobs for updates
    - Backup utilities scheduling recurring jobs
level: medium
