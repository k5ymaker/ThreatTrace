title: Sudo Authentication Brute Force
id: b0c1d2e3-f4a5-6789-bcde-890123456789
status: stable
description: Detects repeated sudo authentication failures on Linux systems, which may indicate a local privilege escalation brute force attempt or password guessing against sudo
references:
    - https://attack.mitre.org/techniques/T1548/003/
    - https://linux.die.net/man/8/sudo
author: ThreatTrace
date: 2024/01/01
tags:
    - attack.t1548.003
    - attack.privilege_escalation
logsource:
    product: linux
    service: auth
detection:
    selection:
        message|contains|all:
            - 'sudo'
            - 'authentication failure'
    condition: selection
falsepositives:
    - Users mistyping their sudo password
    - Automated scripts with incorrect sudo credentials
level: medium
